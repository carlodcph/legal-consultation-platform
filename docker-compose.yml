version: "3.8"

services:

  postgres:
    image: postgres:16
    container_name: legal_postgres
    restart: always
    environment:
      POSTGRES_USER: lawuser
      POSTGRES_PASSWORD: lawpass
      POSTGRES_DB: legal_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: